version: '3.8'

services:
  backend:
    build:
      context: ./smart_bee_backend_starter
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=sqlite:///./smartbee.db
      - GEMINI_API_KEY=${GEMINI_API_KEY}
      - OPENAI_API_KEY=${OPENAI_API_KEY}
    volumes:
      - ./smart_bee_backend_starter/smartbee.db:/app/smartbee.db

  frontend:
    build:
      context: ./Smart Bee Email Interface
      dockerfile: Dockerfile
      args:
        - VITE_API_URL=http://localhost:8000
    ports:
      - "5173:80"
    depends_on:
      - backend
